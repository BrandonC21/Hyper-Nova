<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/estilos/reserva.css">
</head>
<body>
    <header class="header-nav">
        <div class="logo">HYPERNOVA</div>
    </header>
    <main class="contenedor-principal">    
    <div class="reserva">
        <h2>Ver, modificar, Cancelar</h2>
        <p>Para modificar o cancelar una reservación próxima, 
            ingrese el nombre, el apellido  y el folio de reservación.
        </p>
        <form id="buscar-reserva">
          <div class="form-grid">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre"required>
           </div>
           <div class="form-group">
                <label for="RFC">RFC</label>
                <input type="text" id="RFC" name="RFC" required pattern="[A-Za-z0-9Ñ&]{11,}" placeholder="ABCD010101XYZ" maxlength="13">
           </div>
           <div class="form-group">
                <label for="folio">Folio</label>
                <input type="text" id="folio" name="folio" required maxlength="5">
           </div>
           <div class="form-group">
                <label for="email">Correo</label>
                <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
           </div>
           <div class="button-group">
                <button type="submit" id="btn-registar" class="btn">Buscar Reserva</button>
                <button type="button" id="btn-recuperar" class="btn">Recuperar Folio</button>
            </div>
          </div>
        </form>
       </div>
    <div class="informacion" id="informacion">
        <div class="datos-vehiculo" id="datos">

        </div>
    </div>
    </main>
</body>
</html>
