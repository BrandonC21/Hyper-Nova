spring.application.name=Hyper-Nova
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3307/hypernova
spring.datasource.username=root
spring.datasource.password=basedatos
spring.main.allow-circular-references=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.web.resources.static-locations=classpath:/static/,file:src/main/resources/static/
spring.flyway.url=jdbc:mariadb://localhost:3307/hypernova
spring.flyway.user=root
spring.flyway.password=basedatos